spring:
  application:
    name: umudugudu-connect
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url:               jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:umudugudu_db}
    username:          ${DB_USERNAME:postgres}
    password:          ${DB_PASSWORD:123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host:     ${MAIL_HOST:smtp.gmail.com}
    port:     ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret:            ${JWT_SECRET:dev_secret_placeholder_min_32_chars}
    expiration-ms:     3600000
    refresh-expiry-ms: 604800000
  cors:
    allowed-origins:   ${CORS_ORIGINS:http://localhost:3000}
  otp:
    ttl-seconds:       300
    max-attempts:      3
  africas-talking:
    api-key:    ${AT_API_KEY:}
    username:   ${AT_USERNAME:}
    sender-id:  ${AT_SENDER_ID:UmuduguduConnect}
  mtn:
    primary-key:   ${MTN_PRIMARY_KEY:}
    secondary-key: ${MTN_SECONDARY_KEY:}
    base-url:      ${MTN_BASE_URL:https://sandbox.momodeveloper.mtn.com}
    callback-url:  ${MTN_CALLBACK_URL:}
  airtel:
    client-id:     ${AIRTEL_CLIENT_ID:}
    client-secret: ${AIRTEL_CLIENT_SECRET:}
    base-url:      ${AIRTEL_BASE_URL:https://openapi.airtel.africa}
    callback-url:  ${AIRTEL_CALLBACK_URL:}
  fcm:
    server-key:  ${FCM_SERVER_KEY:}
    project-id:  ${FCM_PROJECT_ID:}

logging:
  level:
    com.umudugudu: DEBUG
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url:      jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle:      5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  mail:
    host:     ${MAIL_HOST}
    port:     ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 8080

app:
  jwt:
    secret:            ${JWT_SECRET}
    expiration-ms:     3600000
    refresh-expiry-ms: 604800000
  cors:
    allowed-origins:   ${CORS_ORIGINS}

logging:
  level:
    com.umudugudu: INFO
    root: WARN